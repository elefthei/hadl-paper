name: Lean mechanization

on:
  push:
    branches: [main]
    paths:
      - 'mechanization/**'
      - '.github/workflows/lean.yml'
  pull_request:
    paths:
      - 'mechanization/**'
      - '.github/workflows/lean.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mechanization
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Show Lean toolchain
        run: |
          lean --version
          lake --version

      - name: Cache Lake build artifacts
        uses: actions/cache@v4
        with:
          path: mechanization/.lake
          key: lake-${{ runner.os }}-${{ hashFiles('mechanization/lean-toolchain', 'mechanization/lake-manifest.json', 'mechanization/lakefile.lean') }}
          restore-keys: |
            lake-${{ runner.os }}-

      - name: Fetch Mathlib oleans from cache (if available)
        run: lake exe cache get || true

      - name: Build
        run: lake build
